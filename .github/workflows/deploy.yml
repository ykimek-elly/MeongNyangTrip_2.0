name: Deploy to EC2

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Gradle
        working-directory: backend
        run: ./gradlew build -x test --no-daemon

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd ~/MeongNyangTrip_2.0/backend
            git pull origin main
            docker build -t meongnyang-backend .
            docker stop meongnyang-app || true
            docker rm meongnyang-app || true
            docker run -d --name meongnyang-app \
              -p 8080:8080 \
              -e DB_HOST=meongnyang-db.cf0sk2wkktpg.ap-northeast-2.rds.amazonaws.com \
              -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
              -e SPRING_PROFILES_ACTIVE=prod \
              meongnyang-backend