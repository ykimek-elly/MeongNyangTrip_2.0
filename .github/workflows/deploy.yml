name: Deploy to EC2

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - 'src/**'
      - 'Dockerfile.frontend'
      - 'nginx.conf'
      - 'public/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x backend/gradlew

      - name: Build with Gradle
        working-directory: backend
        run: ./gradlew build -x test --no-daemon

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Deploy to EC2 via SSM
        run: |
          aws ssm send-command \
            --instance-ids "i-007364ef8c4161ab4" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "cd /home/ec2-user/MeongNyangTrip_2.0 && git pull origin main",

              "echo === 백엔드 빌드 ===",
              "if docker build -t meongnyang-backend-new ./backend; then",
              "  docker tag meongnyang-backend-new meongnyang-backend",
              "  docker rmi meongnyang-backend-new || true",
              "  echo 백엔드 빌드 완료",
              "else",
              "  echo 백엔드 빌드 실패 - 기존 컨테이너 유지",
              "  exit 1",
              "fi",

              "echo === 프론트엔드 빌드 ===",
              "if docker build --no-cache --build-arg VITE_KAKAO_MAP_API_KEY=${{ secrets.VITE_KAKAO_MAP_API_KEY }} --build-arg VITE_KAKAO_REST_API_KEY=${{ secrets.VITE_KAKAO_REST_API_KEY }} --build-arg VITE_API_BASE_URL=/api/v1 -t meongnyang-frontend-new -f /home/ec2-user/MeongNyangTrip_2.0/Dockerfile.frontend /home/ec2-user/MeongNyangTrip_2.0; then",
              "  docker tag meongnyang-frontend-new meongnyang-frontend",
              "  docker rmi meongnyang-frontend-new || true",
              "  echo 프론트엔드 빌드 완료",
              "else",
              "  echo 프론트엔드 빌드 실패 - 기존 컨테이너 유지",
              "  exit 1",
              "fi",

              "echo === 컨테이너 교체 (다운타임 최소화) ===",
              "docker stop meongnyang-app || true",
              "docker rm meongnyang-app || true",
              "docker run -d --name meongnyang-app -p 8080:8080 --link meongnyang-redis:redis -e DB_HOST=meongnyang-db.cf0sk2wkktpg.ap-northeast-2.rds.amazonaws.com -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} -e JWT_SECRET=${{ secrets.JWT_SECRET }} -e REDIS_HOST=redis -e REDIS_PORT=6379 -e PET_TOUR_SERVICE_KEY=${{ secrets.PET_TOUR_SERVICE_KEY }} -e KAKAO_REST_API_KEY=${{ secrets.VITE_KAKAO_REST_API_KEY }} -e KAKAO_OAUTH_CLIENT_ID=${{ secrets.KAKAO_OAUTH_CLIENT_ID }} -e KAKAO_OAUTH_CLIENT_SECRET=${{ secrets.KAKAO_OAUTH_CLIENT_SECRET }} -e GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }} -e GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }} -e GOOGLE_PLACES_API_KEY=${{ secrets.GOOGLE_PLACES_API_KEY }} -e GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }} -e GEMINI_API_KEY_2=${{ secrets.GEMINI_API_KEY_2 }} -e NAVER_LOCAL_CLIENT_ID=${{ secrets.NAVER_LOCAL_CLIENT_ID }} -e NAVER_LOCAL_CLIENT_SECRET=${{ secrets.NAVER_LOCAL_CLIENT_SECRET }} -e OAUTH2_REDIRECT_URI=https://meongnyangtrip.duckdns.org/oauth2/callback -e SPRING_PROFILES_ACTIVE=prod --restart=always meongnyang-backend",
              "echo 백엔드 기동 대기 중...",
              "sleep 20",

              "docker stop meongnyang-frontend || true",
              "docker rm meongnyang-frontend || true",
              "docker run -d --name meongnyang-frontend -p 80:80 -p 443:443 -v /etc/letsencrypt:/etc/letsencrypt:ro --link meongnyang-app:app --restart=always meongnyang-frontend",

              "echo === 최종 상태 ===",
              "docker ps",
              "echo === 오래된 이미지 정리 ===",
              "docker image prune -af --filter until=24h || true",
              "docker builder prune -af || true",
              "echo 정리 완료"
            ]' \
            --region ap-northeast-2
