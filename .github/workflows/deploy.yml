name: Deploy to EC2

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - 'src/**'
      - 'Dockerfile.frontend'
      - 'nginx.conf'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x backend/gradlew

      - name: Build with Gradle
        working-directory: backend
        run: ./gradlew build -x test --no-daemon

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Deploy to EC2 via SSM
        run: |
          aws ssm send-command \
            --instance-ids "i-007364ef8c4161ab4" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "cd /home/ec2-user/MeongNyangTrip_2.0 && git pull origin main",
              "echo === 백엔드 빌드 ===",
              "docker build -t meongnyang-backend ./backend",
              "docker stop meongnyang-app || true",
              "docker rm meongnyang-app || true",
              "docker run -d --name meongnyang-app -p 8080:8080 --link meongnyang-redis:redis -e DB_HOST=meongnyang-db.cf0sk2wkktpg.ap-northeast-2.rds.amazonaws.com -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} -e JWT_SECRET=${{ secrets.JWT_SECRET }} -e REDIS_HOST=redis -e REDIS_PORT=6379 -e PET_TOUR_SERVICE_KEY=${{ secrets.PET_TOUR_SERVICE_KEY }} -e SPRING_PROFILES_ACTIVE=prod --restart=always meongnyang-backend",
              "echo === 프론트엔드 빌드 ===",
              "docker build --build-arg VITE_KAKAO_MAP_API_KEY=${{ secrets.VITE_KAKAO_MAP_API_KEY }} --build-arg VITE_API_BASE_URL=/api/v1 -t meongnyang-frontend -f /home/ec2-user/MeongNyangTrip_2.0/Dockerfile.frontend /home/ec2-user/MeongNyangTrip_2.0",
              "docker stop meongnyang-frontend || true",
              "docker rm meongnyang-frontend || true",
              "docker run -d --name meongnyang-frontend -p 80:80 --link meongnyang-app:app --restart=always meongnyang-frontend",
              "echo === 배포 완료 ===",
              "docker ps"
            ]' \
            --region ap-northeast-2