spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME:meongnyang}
    username: ${DB_USERNAME:meongnyang}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  # Gemini
  ai:
    google:
      genai:
        api-key: ${GEMINI_API_KEY}
        embedding:
          api-key: ${GEMINI_API_KEY}
          text:
            options:
              model: gemini-embedding-001
        chat:
          options:
            model: gemini-2.5-flash-lite
            temperature: 0.7

server:
  port: 8080

pet-tour:
  service-key: ${PET_TOUR_SERVICE_KEY}
  base-url: https://apis.data.go.kr/B551011/KorPetTourService2

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:3600000}

weather:
  api:
    key: ${WEATHER_API_KEY}