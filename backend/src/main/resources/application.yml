spring:
  application:
    name: meongnyang-backend

  # 활성 프로필 (로컬 개발: dev, 운영: prod)
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # JDK 21 Virtual Threads 활성화
  threads:
    virtual:
      enabled: true

  # PostgreSQL + PostGIS 연결
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:meongnyang}
    username: ${DB_USERNAME:meongnyang}
    password: ${DB_PASSWORD:meongnyang1234}
    driver-class-name: org.postgresql.Driver

  # JPA 설정
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Redis 연결
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  # Gmail SMTP (아이디 찾기 / 임시 비밀번호 발송)
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # OAuth2 소셜 로그인
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope: email, profile
          kakao:
            client-id: ${KAKAO_OAUTH_CLIENT_ID:}
            client-secret: ${KAKAO_OAUTH_CLIENT_SECRET:}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: profile_nickname, profile_image, account_email
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

server:
  port: ${SERVER_PORT:8080}


# 한국관광공사 반려동물 동반여행 API
pet-tour:
  service-key: ${PET_TOUR_SERVICE_KEY:}
  base-url: https://apis.data.go.kr/B551011/KorPetTourService2

# 카카오 REST API (Local API 교차검증)
kakao:
  rest-api-key: ${KAKAO_REST_API_KEY:}

# Google Places API (3단계 속성 보강 — allowsDogs)
google:
  places:
    api-key: ${GOOGLE_PLACES_API_KEY:}
    base-url: https://places.googleapis.com/v1

# Google Gemini Vision API (이미지 적합성 검증 배치)
# 키 소진 시 자동 전환 — 최대 2개 키 지원
gemini:
  api:
    key: ${GEMINI_API_KEY:}
    key2: ${GEMINI_API_KEY_2:}

# 네이버 지역 검색 API (이미지 보강 — imageUrl 없는 장소 대상)
naver:
  local:
    client-id: ${NAVER_LOCAL_CLIENT_ID:}
    client-secret: ${NAVER_LOCAL_CLIENT_SECRET:}

# JWT 설정
jwt:
  secret: ${JWT_SECRET:dev-secret-key-change-in-production}
  expiration: ${JWT_EXPIRATION:3600000}

# 소셜 로그인 성공 후 FE 리다이렉트 URL
oauth2:
  redirect-uri: ${OAUTH2_REDIRECT_URI:http://localhost:5173/oauth2/callback}

# 회원가입 완료 사용자 JSON 저장 경로 (AI 서비스 데이터 수집용)
app:
  signup:
    export-path: ${SIGNUP_EXPORT_PATH:exports/registered_users.json}
    
# AWS S3
cloud:
  aws:
    s3:
      bucket: meongnyangtrip-bucket
    region:
      static: ap-northeast-2
    stack:
      auto: false