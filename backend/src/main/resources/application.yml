spring:
  config:
    import: optional:file:./.env[.properties]

  application:
    name: meongnyang-backend

  # 활성 프로필 (로컬 개발: dev, 운영: prod)
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # Gemini
  ai:
    google:
      genai:
        api-key: ${GEMINI_API_KEY}
        embedding:
          api-key: ${GEMINI_API_KEY}
          text:
            options:
              model: gemini-embedding-001
        chat:
          options:
            model: gemini-2.5-flash-lite
            temperature: 0.7
  # JDK 21 Virtual Threads 활성화
  threads:
    virtual:
      enabled: true

  # PostgreSQL + PostGIS 연결
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:meongnyang}
    username: ${DB_USERNAME:meongnyang}
    password: ${DB_PASSWORD:meongnyang1234}
    driver-class-name: org.postgresql.Driver

  # JPA 설정
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Redis 연결
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: ${SERVER_PORT:8080}

# 한국관광공사 반려동물 동반여행 API
pet-tour:
  service-key: ${PET_TOUR_SERVICE_KEY:}
  base-url: https://apis.data.go.kr/B551011/KorPetTourService2

# 카카오 REST API (Local API 교차검증)
kakao:
  rest-api-key: ${KAKAO_REST_API_KEY:}

# JWT 설정 (팀원 A 작업용)
jwt:
  secret: ${JWT_SECRET:dev-secret-key-change-in-production}
  expiration: ${JWT_EXPIRATION:3600000}

weather:
  api:
    key: ${WEATHER_API_KEY:}

