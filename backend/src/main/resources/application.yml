spring:
  config:
    import:
      - optional:file:${user.dir}/.env[.properties]
      - optional:file:${user.dir}/backend/.env[.properties]

  application:
    name: meongnyang-backend

  # 활성 프로필 (로컬 개발: dev, 운영: prod)
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # JDK 21 Virtual Threads 활성화
  threads:
    virtual:
      enabled: true

  # PostgreSQL + PostGIS 연결
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:meongnyang}
    username: ${DB_USERNAME:meongnyang}
    password: ${DB_PASSWORD:meongnyang1234}
    driver-class-name: org.postgresql.Driver

  # JPA 설정
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Gemini
  ai:
    google:
      genai:
        api-key: ${GEMINI_API_KEY}
        embedding:
          api-key: ${GEMINI_API_KEY}
          text:
            options:
              model: gemini-embedding-001
        chat:
          options:
            model: gemini-2.5-flash-lite
            temperature: 0.7

  # Redis 연결
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  # Gmail SMTP (아이디 찾기 / 임시 비밀번호 발송)
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # OAuth2 소셜 로그인
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:test}
            client-secret: ${GOOGLE_CLIENT_SECRET:test}
            scope: email, profile
          kakao:
            client-id: ${KAKAO_OAUTH_CLIENT_ID:}
            client-secret: ${KAKAO_OAUTH_CLIENT_SECRET:}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: profile_nickname, profile_image, account_email
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

server:
  port: ${SERVER_PORT:8080}


# 한국관광공사 반려동물 동반여행 API
pet-tour:
  service-key: ${PET_TOUR_SERVICE_KEY:}
  base-url: https://apis.data.go.kr/B551011/KorPetTourService2

# 카카오 REST API (Local API 교차검증)
kakao:
  rest-api-key: ${KAKAO_REST_API_KEY:}

# Google Places API (3단계 속성 보강 — allowsDogs)
google:
  places:
    api-key: ${GOOGLE_PLACES_API_KEY:}
    base-url: https://places.googleapis.com/v1

# Google Gemini Vision API (이미지 적합성 검증 배치)
# 키 소진 시 자동 전환 — 최대 2개 키 지원
gemini:
  api:
    key: ${GEMINI_API_KEY:}
    key2: ${GEMINI_API_KEY_2:}

# 네이버 지역 검색 API (이미지 보강 — imageUrl 없는 장소 대상)
naver:
  local:
    client-id: ${NAVER_LOCAL_CLIENT_ID:}
    client-secret: ${NAVER_LOCAL_CLIENT_SECRET:}

# JWT 설정
jwt:
  secret: ${JWT_SECRET:dev-secret-key-change-in-production}
  expiration: ${JWT_EXPIRATION:3600000}

# 소셜 로그인 성공 후 FE 리다이렉트 URL
oauth2:
  redirect-uri: ${OAUTH2_REDIRECT_URI:http://localhost:5173/oauth2/callback}

batch:
  weather-preload-cron: 0 50 8 * * *
  notification-cron: 0 0/30 9,18 * * *
  notification-parallelism: 5

redis:
  daily-recommendation-cache-key: recommendation:daily
  daily-recommendation-cache-ttl: 24h
  weather-cache-key: weather
  weather-cache-ttl: 3h
  weather-cache-ttl-stable: 30m
  weather-cache-ttl-severe: 10m
  gemini-cache-key: gemini
  gemini-cache-ttl: 6h
  gemini-context-cache-ttl: 12h
  recommendation-cache-ttl: 10m
  recommendation-request-lock-ttl: 2m
  recommendation-history-ttl: 72h

ncloud:
  sens:
    base-url: ${NCLOUD_SENS_BASE_URL:https://sens.apigw.ntruss.com}
    service-id: ${NCLOUD_SENS_SERVICE_ID:}
    access-key: ${NCLOUD_SENS_ACCESS_KEY:}
    secret-key: ${NCLOUD_SENS_SECRET_KEY:}
    plus-friend-id: ${NCLOUD_SENS_PLUS_FRIEND_ID:}
    template-code: ${NCLOUD_SENS_TEMPLATE_CODE:}
    detail-link-prefix: ${NCLOUD_SENS_DETAIL_LINK_PREFIX:http://localhost:5173/place/}
    delivery:
      poll-delays-ms: ${NCLOUD_SENS_DELIVERY_POLL_DELAYS_MS:1000,3000,5000}
    template:
      sunny: ${NCLOUD_SENS_TEMPLATE_CODE_SUNNY:}
      cloudy: ${NCLOUD_SENS_TEMPLATE_CODE_CLOUDY:}
      cold: ${NCLOUD_SENS_TEMPLATE_CODE_COLD}
      hot: ${NCLOUD_SENS_TEMPLATE_CODE_HOT}
      rain: ${NCLOUD_SENS_TEMPLATE_CODE_RAIN}
      default-code: ${NCLOUD_SENS_TEMPLATE_CODE_DEFAULT:${NCLOUD_SENS_TEMPLATE_CODE:}}

# 회원가입 완료 사용자 JSON 저장 경로 (AI 서비스 데이터 수집용)
app:
  signup:
    export-path: ${SIGNUP_EXPORT_PATH:exports/registered_users.json}
